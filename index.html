<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" sizes="32x32" href="/favicon.png" />
    <link rel="icon" sizes="16x16" href="/favicon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO básico -->
    <title>MedConvert | Páginas web para médicos que consiguen pacientes</title>
    <meta
      name="description"
      content="Creamos páginas web para médicos que convierten visitas en pacientes reales a través de WhatsApp. Empieza a recibir más consultas hoy."
    />

    <!-- Open Graph (Facebook, WhatsApp, etc.) -->
    <meta
      property="og:title"
      content="MedConvert | Más pacientes para tu consulta"
    />
    <meta
      property="og:description"
      content="Páginas web diseñadas para que los pacientes te contacten directamente por WhatsApp. Convierte visitas en consultas reales."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://medconvert.vercel.app" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="MedConvert | Más pacientes para tu consulta"
    />
    <meta
      name="twitter:description"
      content="Páginas web optimizadas para médicos. Atrae pacientes y recibe consultas por WhatsApp."
    />
    <meta name="twitter:image" content="/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
